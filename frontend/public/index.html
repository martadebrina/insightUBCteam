<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>310 Frontend</title>
    <link href="/style.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Sections Insight</h1>
    </header>

    <main>
        <section>
            <h2>Upload Dataset</h2>
            <form id="upload-form">
                <label for="dataset-id">Dataset ID:</label>
                <input type="text" id="dataset-id" name="dataset-id" required>

                <label for="dataset-kind">Dataset Kind:</label>
                <select id="dataset-kind" name="dataset-kind" required>
                    <option value="sections">Sections</option>
                    <!--<option value="rooms">Rooms</option>-->
                </select>

                <label for="dataset-file">Upload Dataset (.zip):</label>
                <input type="file" id="dataset-file" name="dataset-file" accept=".zip" required>

                <button id="upload-button" class="button" type="submit">Upload Dataset</button>
            </form>
            <p id="upload-status"></p>
        </section>

        <section>
            <h2>Remove Dataset</h2>
            <form id="remove-dataset-form">
                <label for="remove-dataset-id">Dataset ID:</label>
                <input type="text" id="remove-dataset-id" name="remove-dataset-id" required>
                <button id="remove-dataset-button" class="button" type="submit">Remove Dataset</button>
            </form>
            <p id="remove-status"></p>
        </section>

        <section>
            <h2>List Datasets</h2>
            <button id="list-datasets-btn" class="button">View Datasets</button>
            <ul id="dataset-list"></ul>
        </section>

        <section>
            <h2>Enrollment Trends</h2>
            <form id="enrollment-form">
                <label for="course-id">Course ID:</label>
                <input type="text" id="course-id" name="course-id" placeholder="e.g., CPSC110" required>
        
                <button type="submit" class="button">Generate Chart</button>
            </form>
            <p id="query-status"></p>
            <canvas id="enrollment-chart" width="800" height="400"></canvas>
        </section>               

		<section>
			<h2>View Course Averages</h2>
			<form id="filter-form">
				<label for="department">Department (optional):</label>
				<input type="text" id="department" name="department" placeholder="e.g., CPSC">
				<button id="generate-chart" class="button" type="submit">Generate Chart</button>
			</form>
			<p id="query-status"></p>
			<div>
				<canvas id="course-chart" width="800" height="400"></canvas>
			</div>
		</section>

    </main>

    <footer>
        <p>&copy; Team Kodok</p>
    </footer>

    <script type="text/javascript" src="/frontend.js"></script>
</body>
</html>
